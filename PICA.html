<!DOCTYPE html>
<html>
<head>
<title>System Access</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family: monospace;
    font-size:18px;
    padding:20px;
}

#terminal{
    white-space: pre-line;
}

.cursor{
    display:inline-block;
    width:10px;
    background:#00ff00;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}
</style>

</head>

<body>

<div id="terminal"></div>

<script>

const lines = [
"Initializing system...",
"Connecting to secure server...",
"Bypassing firewall...",
"Decrypting secret message...",
"",
"Access Granted ❤️",
"",
"Hello my love.",
"",
"This program was written specially for you.",
"Awak jangan stress stress tau ingat if awak rasa awak sorang ii awak kena ingat yang saya akan selalu ada untuk awak,",
"I’m grateful that I found you.",
"",
"You are the best thing in my life.",
"",
"I love you Aireen❤️",
"",
"- Hadi"
];

let i = 0;
let terminal = document.getElementById("terminal");

function typeLine(){
    if(i < lines.length){
        terminal.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(typeLine, 1200);
    }
}

typeLine();

</script>

</body>
</html>
